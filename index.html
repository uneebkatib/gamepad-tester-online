<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gamepad Tester Online</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      text-align: center;
      padding: 30px;
    }
    h1 { color: #38bdf8; }

    .box {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #334155;
      border-radius: 10px;
      display: inline-block;
      min-width: 300px;
    }

    .btn {
      display: inline-block;
      margin: 5px;
      padding: 8px 12px;
      border-radius: 6px;
      background: #1e293b;
    }

    .active {
      background: #22c55e !important;
      color: #000;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>🎮 Gamepad Tester Online</h1>
  <p>Connect your controller and press buttons</p>

  <div class="box">
    <h3 id="status">No Gamepad Connected</h3>
    <div id="info"></div>
    <div id="buttons"></div>
  </div>

  <script>
    let gamepadIndex = null;

    window.addEventListener("gamepadconnected", (e) => {
      gamepadIndex = e.gamepad.index;
      document.getElementById("status").innerText =
        "Gamepad Connected: " + e.gamepad.id;
      loop();
    });

    window.addEventListener("gamepaddisconnected", () => {
      gamepadIndex = null;
      document.getElementById("status").innerText = "Gamepad Disconnected";
      document.getElementById("buttons").innerHTML = "";
    });

    function loop() {
      if (gamepadIndex === null) return;

      const gp = navigator.getGamepads()[gamepadIndex];
      if (!gp) return;

      document.getElementById("info").innerHTML = `
        <p>Axes: ${gp.axes.map(a => a.toFixed(2)).join(", ")}</p>
      `;

      const btnContainer = document.getElementById("buttons");
      btnContainer.innerHTML = "";

      gp.buttons.forEach((btn, i) => {
        const div = document.createElement("div");
        div.className = "btn" + (btn.pressed ? " active" : "");
        div.innerText = "Button " + i;
        btnContainer.appendChild(div);
      });

      requestAnimationFrame(loop);
    }
  </script>

</body>
</html>
